name: Promote Claude feed

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write

jobs:
  promote:
    if: github.event.deleted == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout generated feed
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: generated

      - name: Checkout main feed
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable

      - name: Promote generated feed files
        run: |
          set -euo pipefail
          node stable/scripts/promote-claude-feed.mjs generated stable

      - name: Commit promoted feed
        working-directory: stable
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json episodes
          if git diff --cached --quiet; then
            echo "No feed changes to promote."
            exit 0
          fi
          git commit -m "chore(feed): Claude 피드 승격"
          git push origin HEAD:main

      - name: Delete promoted Claude branch
        if: success()
        run: |
          set -euo pipefail
          git push origin --delete "${GITHUB_REF_NAME}"
